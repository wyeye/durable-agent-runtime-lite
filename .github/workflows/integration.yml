name: Integration

on:
  workflow_dispatch:
  schedule:
    - cron: "17 18 * * *"
  push:
    branches:
      - main

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      DATABASE_URL: postgres://dar:dar_local_password@localhost:15432/durable_agent_runtime
      RUNTIME_API_URL: http://localhost:3000
      TOOL_GATEWAY_URL: http://localhost:3200
      RUNTIME_WORKER_URL: http://localhost:3300
      TEMPORAL_ADDRESS: localhost:7233
      TEMPORAL_NAMESPACE: default
      PI_AGENT_MODE: deterministic
      PI_CRASH_RESULT_FILE: artifacts/pi-worker-crash-resume/result.json
      TEMPORAL_REPLAY_SMOKE_RESULT_FILE: artifacts/pi-worker-crash-resume/result.json
      TEMPORAL_REPLAY_FIXTURE_DIR: tests/temporal-replay/histories
      COMPOSE_PARALLEL_LIMIT: 1
      APP_VERSION: 0.8.0

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10.0.0
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Verify toolchain
        run: |
          node --version
          pnpm --version
          command -v pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @dar/control-plane exec playwright install --with-deps chromium

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit and contract tests
        run: pnpm test

      - name: Build workspace
        run: pnpm build

      - name: Temporal replay unit gate
        run: pnpm test:temporal-replay

      - name: Compose config
        run: docker compose -f infra/docker-compose.yml config

      - name: Pi compose config
        run: docker compose -f infra/docker-compose.yml -f infra/docker-compose.pi-smoke.yml config

      - name: Build production images
        run: |
          BUILD_SHA="${GITHUB_SHA}"
          BUILD_TIME="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          docker compose -f infra/docker-compose.yml build \
            --build-arg APP_VERSION="${APP_VERSION}" \
            --build-arg BUILD_SHA="${BUILD_SHA}" \
            --build-arg BUILD_TIME="${BUILD_TIME}" \
            control-plane runtime-api runtime-worker tool-gateway

      - name: Start dependencies
        run: docker compose -f infra/docker-compose.yml up -d postgres valkey temporal temporal-ui

      - name: Run migrations against Docker DB
        run: pnpm db:migrate

      - name: Seed examples
        run: pnpm seed:examples

      - name: Start runtime stack
        run: docker compose -f infra/docker-compose.yml -f infra/docker-compose.pi-smoke.yml up -d mock-server tool-gateway runtime-worker runtime-api control-plane

      - name: Wait for readiness
        run: |
          node - <<'NODE'
          const targets = [
            ['runtime-api', 'http://localhost:3000/readyz'],
            ['tool-gateway', 'http://localhost:3200/readyz'],
            ['runtime-worker', 'http://localhost:3300/readyz'],
            ['control-plane', 'http://localhost:3100/readyz'],
          ];
          const deadline = Date.now() + 120_000;
          while (Date.now() < deadline) {
            const results = await Promise.all(targets.map(async ([name, url]) => {
              try {
                const response = await fetch(url);
                return [name, response.ok, response.status];
              } catch {
                return [name, false, 0];
              }
            }));
            if (results.every(([, ok]) => ok)) {
              console.log(JSON.stringify(Object.fromEntries(results.map(([name, ok, status]) => [name, { ok, status }]))));
              process.exit(0);
            }
            await new Promise((resolve) => setTimeout(resolve, 2000));
          }
          throw new Error('runtime stack did not become ready');
          NODE

      - name: Smoke temporal DB E2E
        run: pnpm smoke:temporal-db-e2e

      - name: Smoke control-plane API E2E
        run: pnpm smoke:control-plane-api-e2e

      - name: Smoke control-plane UI E2E
        run: pnpm smoke:control-plane-ui-e2e

      - name: Pi readonly deterministic smoke
        run: pnpm smoke:pi-readonly-e2e

      - name: Pi L3 deterministic smoke
        run: pnpm smoke:pi-l3-e2e

      - name: Pi user-input deterministic smoke
        run: pnpm smoke:pi-user-input-e2e

      - name: Pi handoff deterministic smoke
        run: pnpm smoke:pi-handoff-e2e

      - name: Switch worker to model gateway smoke mode
        run: |
          PI_AGENT_MODE=model_gateway \
            docker compose -f infra/docker-compose.yml -f infra/docker-compose.pi-smoke.yml up -d runtime-worker

      - name: Wait for model-gateway worker readiness
        run: |
          node - <<'NODE'
          const deadline = Date.now() + 60_000;
          while (Date.now() < deadline) {
            try {
              const response = await fetch('http://localhost:3300/readyz');
              const body = await response.json().catch(() => ({}));
              if (response.ok && body?.checks?.pi_agent_mode === 'model_gateway') {
                console.log(JSON.stringify(body.checks));
                process.exit(0);
              }
              console.log(`runtime-worker readiness ${response.status}: ${JSON.stringify(body)}`);
            } catch (error) {
              console.log(`runtime-worker readiness probe failed: ${error.message}`);
            }
            await new Promise((resolve) => setTimeout(resolve, 2000));
          }
          throw new Error('runtime-worker did not enter model_gateway mode');
          NODE

      - name: Pi model gateway smoke test
        run: pnpm smoke:pi-model-gateway-e2e

      - name: Switch control-plane to required evaluation gate mode
        run: |
          EVALUATION_GATE_MODE=required \
            docker compose -f infra/docker-compose.yml -f infra/docker-compose.pi-smoke.yml up -d control-plane

      - name: Wait for control-plane readiness after gate mode switch
        run: |
          node - <<'NODE'
          const deadline = Date.now() + 60_000;
          while (Date.now() < deadline) {
            try {
              const response = await fetch('http://localhost:3100/readyz');
              if (response.ok) {
                console.log(JSON.stringify(await response.json()));
                process.exit(0);
              }
              console.log(`control-plane readiness status ${response.status}`);
            } catch (error) {
              console.log(`control-plane readiness probe failed: ${error.message}`);
            }
            await new Promise((resolve) => setTimeout(resolve, 2000));
          }
          throw new Error('control-plane did not become ready after gate mode switch');
          NODE

      - name: Evaluation Framework Smoke
        run: pnpm smoke:evaluation-framework-e2e

      - name: Evaluation Regression Gate Smoke
        run: pnpm smoke:evaluation-regression-gate-e2e

      - name: Evaluation Publish Gate Smoke
        run: pnpm smoke:evaluation-publish-gate-e2e

      - name: Export Evaluation Histories
        run: pnpm temporal:export-evaluation-replay-fixtures

      - name: Replay Evaluation Histories
        run: pnpm test:temporal-replay

      - name: Switch worker back to deterministic smoke mode
        run: docker compose -f infra/docker-compose.yml -f infra/docker-compose.pi-smoke.yml up -d runtime-worker

      - name: Wait for deterministic worker readiness
        run: |
          node - <<'NODE'
          const deadline = Date.now() + 60_000;
          while (Date.now() < deadline) {
            try {
              const response = await fetch('http://localhost:3300/readyz');
              if (response.ok) {
                const body = await response.json();
                if (body?.checks?.pi_agent_mode === 'deterministic') {
                  console.log(JSON.stringify(body.checks));
                  process.exit(0);
                }
                console.log(`runtime-worker ready but not deterministic: ${JSON.stringify(body)}`);
              } else {
                console.log(`runtime-worker readiness status ${response.status}`);
              }
            } catch {
              // keep polling
            }
            await new Promise((resolve) => setTimeout(resolve, 2000));
          }
          throw new Error('runtime-worker did not become ready');
          NODE

      - name: Worker crash smoke
        run: pnpm smoke:pi-worker-crash-resume-e2e

      - name: Tenant policy smoke
        run: pnpm smoke:tenant-policy-e2e

      - name: Tenant policy snapshot smoke
        run: pnpm smoke:tenant-policy-snapshot-e2e

      - name: Tenant concurrency smoke
        run: pnpm smoke:tenant-concurrency-e2e

      - name: Tenant flow-agent smoke
        run: pnpm smoke:tenant-flow-agent-e2e

      - name: Tenant handoff lineage smoke
        run: pnpm smoke:tenant-handoff-lineage-e2e

      - name: Tenant policy crash snapshot smoke
        run: pnpm smoke:tenant-policy-crash-snapshot-e2e

      - name: Tenant admission reconcile smoke
        run: pnpm smoke:tenant-admission-reconcile-e2e

      - name: Export real Temporal histories
        run: pnpm temporal:export-replay-fixtures

      - name: Replay exported histories
        run: pnpm test:temporal-replay

      - name: Docker stack status
        run: docker compose -f infra/docker-compose.yml -f infra/docker-compose.pi-smoke.yml ps

      - name: Docker diagnostics on failure
        if: failure()
        run: |
          mkdir -p artifacts/docker
          docker compose -f infra/docker-compose.yml -f infra/docker-compose.pi-smoke.yml ps > artifacts/docker/ps.txt
          docker compose -f infra/docker-compose.yml -f infra/docker-compose.pi-smoke.yml logs --no-color --tail=300 \
            | sed -E 's/(TOKEN|SECRET|PASSWORD|API_KEY)=([^[:space:]]+)/\1=[REDACTED]/g; s/Bearer [A-Za-z0-9_.-]+/Bearer [REDACTED]/g; s/dev-only-[A-Za-z0-9_.-]+-token/dev-only-[REDACTED]-token/g' \
            > artifacts/docker/logs.txt

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-artifacts
          path: |
            artifacts/
            tests/temporal-replay/histories/
          retention-days: 7

      - name: Stop Docker stack
        if: always()
        run: docker compose -f infra/docker-compose.yml -f infra/docker-compose.pi-smoke.yml down -v
