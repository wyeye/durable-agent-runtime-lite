name: Live Model Gateway

on:
  workflow_dispatch:

concurrency:
  group: live-model-${{ github.ref }}
  cancel-in-progress: false

jobs:
  live-model-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: live-model-smoke

    env:
      LIVE_MODEL_GATEWAY_ENABLED: "true"
      LIVE_MODEL_GATEWAY_PROTOCOL: openai_chat_completions
      LIVE_MODEL_GATEWAY_BASE_URL: ${{ secrets.LIVE_MODEL_GATEWAY_BASE_URL }}
      LIVE_MODEL_GATEWAY_API_KEY: ${{ secrets.LIVE_MODEL_GATEWAY_API_KEY }}
      LIVE_MODEL_GATEWAY_MODEL: ${{ secrets.LIVE_MODEL_GATEWAY_MODEL }}
      LIVE_MODEL_GATEWAY_PROVIDER: ${{ secrets.LIVE_MODEL_GATEWAY_PROVIDER }}
      LIVE_MODEL_GATEWAY_FALLBACK_MODEL: ${{ secrets.LIVE_MODEL_GATEWAY_FALLBACK_MODEL }}

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10.0.0
          run_install: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Mask live secrets
        run: |
          echo "::add-mask::${LIVE_MODEL_GATEWAY_API_KEY}"
          echo "::add-mask::${LIVE_MODEL_GATEWAY_BASE_URL}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Static gates
        run: |
          pnpm version:check
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Live final probe
        run: pnpm smoke:model-gateway-live-final-e2e

      - name: Live readonly tool-call probe
        run: pnpm smoke:model-gateway-live-readonly-e2e

      - name: Live L3 tool-call probe
        run: pnpm smoke:model-gateway-live-l3-e2e

      - name: Temporal replay gate
        run: pnpm test:temporal-replay
