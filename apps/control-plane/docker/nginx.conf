server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok
";
    }

    location = /readyz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ready
";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
