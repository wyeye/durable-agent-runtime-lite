services:
  mock-server:
    build:
      context: ..
      dockerfile: devtools/mock-server/Dockerfile
    image: durable-agent-runtime/mock-server:local
    container_name: dar-mock-server
    environment:
      NODE_ENV: development
      APP_ENV: development
      HOST: 0.0.0.0
      PORT: 4100
      LOG_LEVEL: info
    ports:
      - "${MOCK_SERVER_HOST_PORT:-4100}:4100"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4100/readyz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  runtime-worker:
    restart: "no"
    depends_on:
      mock-server:
        condition: service_healthy
    environment:
      NODE_ENV: development
      APP_ENV: development
      TENANT_RUNTIME_POLICY_MODE: ${TENANT_RUNTIME_POLICY_MODE:-optional}
      EVALUATION_WORKER_ENABLED: ${EVALUATION_WORKER_ENABLED:-false}
      EVALUATION_TASK_QUEUE: ${EVALUATION_TASK_QUEUE:-evaluation-worker-main}
      MODEL_CREDENTIAL_MASTER_KEY: ${MODEL_CREDENTIAL_MASTER_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      MODEL_GATEWAY_CLIENT_CACHE_TTL_MS: ${MODEL_GATEWAY_CLIENT_CACHE_TTL_MS:-60000}
      MODEL_GATEWAY_BASE_URL: http://mock-server:4100
      MODEL_GATEWAY_API_KEY: dev-only-placeholder
      MODEL_GATEWAY_MODE: mock
      MODEL_GATEWAY_PROTOCOL: ${MODEL_GATEWAY_PROTOCOL:-openai_chat_completions}
      MODEL_GATEWAY_TIMEOUT_MS: 30000
      MODEL_GATEWAY_MAX_RETRIES: 1
      MODEL_GATEWAY_MAX_RESPONSE_BYTES: 1000000
      MODEL_GATEWAY_ALLOW_INSECURE_HTTP: true
      MODEL_GATEWAY_IDEMPOTENCY_HEADER: Idempotency-Key
      MODEL_GATEWAY_USER_AGENT: durable-agent-runtime-lite/runtime-worker-smoke
      PI_MAX_SEGMENTS_BEFORE_CONTINUE_AS_NEW: ${PI_MAX_SEGMENTS_BEFORE_CONTINUE_AS_NEW:-2}

  tool-gateway:
    environment:
      NODE_ENV: development
      APP_ENV: development
      TOOL_HTTP_ALLOWED_HOSTS: ${TOOL_HTTP_ALLOWED_HOSTS:-mock-server,localhost,127.0.0.1}
      TOOL_HTTP_ALLOW_INSECURE_LOCALHOST: "true"
      TOOL_HTTP_MAX_TIMEOUT_MS: ${TOOL_HTTP_MAX_TIMEOUT_MS:-15000}
      TOOL_HTTP_MAX_RESPONSE_BYTES: ${TOOL_HTTP_MAX_RESPONSE_BYTES:-1048576}
      TOOL_SECRET_BUSINESS_API: ${TOOL_SECRET_BUSINESS_API:-business-read-secret}

  control-plane:
    environment:
      NODE_ENV: development
      APP_ENV: development
      EVALUATION_GATE_MODE: ${EVALUATION_GATE_MODE:-advisory}
      MODEL_GATEWAY_ALLOW_INSECURE_HTTP: ${MODEL_GATEWAY_ALLOW_INSECURE_HTTP:-true}
      ROUTER_SEMANTIC_ENABLED: ${ROUTER_SEMANTIC_ENABLED:-true}
      ROUTER_EMBEDDING_MODEL_ID: ${ROUTER_EMBEDDING_MODEL_ID:-mock-embedding-1536}
      ROUTER_EMBEDDING_MODEL_VERSION: ${ROUTER_EMBEDDING_MODEL_VERSION:-1}
      CONTROL_PLANE_STATIC_ENABLED: "true"

  runtime-api:
    environment:
      MODEL_GATEWAY_ALLOW_INSECURE_HTTP: ${MODEL_GATEWAY_ALLOW_INSECURE_HTTP:-true}
      ROUTER_SEMANTIC_ENABLED: ${ROUTER_SEMANTIC_ENABLED:-true}
      ROUTER_EMBEDDING_MODEL_ID: ${ROUTER_EMBEDDING_MODEL_ID:-mock-embedding-1536}
      ROUTER_EMBEDDING_MODEL_VERSION: ${ROUTER_EMBEDDING_MODEL_VERSION:-1}
