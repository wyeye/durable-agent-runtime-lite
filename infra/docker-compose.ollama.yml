services:
  runtime-worker:
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      NODE_ENV: development
      APP_ENV: development
      MODEL_GATEWAY_MODE: openai_compatible
      MODEL_GATEWAY_PROTOCOL: openai_chat_completions
      MODEL_CREDENTIAL_MASTER_KEY: ${MODEL_CREDENTIAL_MASTER_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      MODEL_GATEWAY_CLIENT_CACHE_TTL_MS: ${MODEL_GATEWAY_CLIENT_CACHE_TTL_MS:-60000}
      MODEL_GATEWAY_BASE_URL: http://host.docker.internal:11434/v1
      MODEL_GATEWAY_API_KEY: ollama
      MODEL_GATEWAY_TIMEOUT_MS: 300000
      MODEL_GATEWAY_MAX_RETRIES: 1
      MODEL_GATEWAY_MAX_RESPONSE_BYTES: 1048576
      MODEL_GATEWAY_ALLOW_INSECURE_HTTP: true
      MODEL_GATEWAY_IDEMPOTENCY_HEADER: Idempotency-Key
      MODEL_GATEWAY_USER_AGENT: durable-agent-runtime-lite/runtime-worker-ollama
      EVALUATION_WORKER_ENABLED: 'true'
      EVALUATION_TASK_QUEUE: evaluation-worker-main
      EVALUATION_MAX_CONCURRENT_RUNS: '1'
      EVALUATION_MAX_CONCURRENT_CASES: '1'
      EVALUATION_CASE_TIMEOUT_MS: '300000'
