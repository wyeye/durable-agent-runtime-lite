services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: dar-postgres
    environment:
      POSTGRES_DB: durable_agent_runtime
      POSTGRES_USER: dar
      POSTGRES_PASSWORD: dar_local_password
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dar -d durable_agent_runtime"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8
    container_name: dar-valkey
    ports:
      - "${VALKEY_HOST_PORT:-16380}:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.26
    container_name: dar-temporal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: dar
      POSTGRES_PWD: dar_local_password
      POSTGRES_SEEDS: postgres
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/docker.yaml
    ports:
      - "${TEMPORAL_HOST_PORT:-7233}:7233"

  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: dar-temporal-ui
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3100,http://localhost:3000
    ports:
      - "${TEMPORAL_UI_HOST_PORT:-8233}:8080"

  tool-gateway:
    build:
      context: ..
      dockerfile: apps/tool-gateway/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.8.0}
        BUILD_SHA: ${BUILD_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: durable-agent-runtime/tool-gateway:local
    container_name: dar-tool-gateway
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3200
      DATABASE_URL: postgres://dar:dar_local_password@postgres:5432/durable_agent_runtime
      VALKEY_URL: redis://valkey:6379
      TOOL_GATEWAY_REGISTRY_SOURCE: db
      TOOL_GATEWAY_AUTH_MODE: service_token
      TENANT_RUNTIME_POLICY_MODE: required
      TOOL_HTTP_ALLOWED_HOSTS: ${TOOL_HTTP_ALLOWED_HOSTS:-}
      TOOL_HTTP_ALLOW_INSECURE_LOCALHOST: ${TOOL_HTTP_ALLOW_INSECURE_LOCALHOST:-false}
      TOOL_HTTP_MAX_TIMEOUT_MS: ${TOOL_HTTP_MAX_TIMEOUT_MS:-15000}
      TOOL_HTTP_MAX_RESPONSE_BYTES: ${TOOL_HTTP_MAX_RESPONSE_BYTES:-1048576}
      TOOL_GATEWAY_DEBUG_ENDPOINTS_ENABLED: "false"
      TOOL_GATEWAY_RUNTIME_WORKER_TOKEN: ${TOOL_GATEWAY_RUNTIME_WORKER_TOKEN:-dev-only-runtime-worker-token}
      TOOL_GATEWAY_CONTROL_PLANE_TOKEN: ${TOOL_GATEWAY_CONTROL_PLANE_TOKEN:-dev-only-control-plane-token}
      LOG_LEVEL: info
    ports:
      - "${TOOL_GATEWAY_HOST_PORT:-3200}:3200"

  runtime-worker:
    build:
      context: ..
      dockerfile: apps/runtime-worker/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.8.0}
        BUILD_SHA: ${BUILD_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: durable-agent-runtime/runtime-worker:local
    container_name: dar-runtime-worker
    depends_on:
      temporal:
        condition: service_started
      tool-gateway:
        condition: service_started
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3300
      DATABASE_URL: postgres://dar:dar_local_password@postgres:5432/durable_agent_runtime
      VALKEY_URL: redis://valkey:6379
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      TOOL_GATEWAY_URL: http://tool-gateway:3200
      RUNTIME_WORKER_TOOL_GATEWAY_TOKEN: ${RUNTIME_WORKER_TOOL_GATEWAY_TOKEN:-dev-only-runtime-worker-token}
      RUNTIME_WORKER_MODE: temporal
      MODEL_GATEWAY_MODE: ${MODEL_GATEWAY_MODE:-disabled}
      MODEL_GATEWAY_PROTOCOL: ${MODEL_GATEWAY_PROTOCOL:-dar_generate}
      MODEL_GATEWAY_CONFIG_SOURCE: ${MODEL_GATEWAY_CONFIG_SOURCE:-db}
      MODEL_CREDENTIAL_MASTER_KEY: ${MODEL_CREDENTIAL_MASTER_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      MODEL_GATEWAY_CLIENT_CACHE_TTL_MS: ${MODEL_GATEWAY_CLIENT_CACHE_TTL_MS:-60000}
      MODEL_GATEWAY_TIMEOUT_MS: ${MODEL_GATEWAY_TIMEOUT_MS:-30000}
      MODEL_GATEWAY_MAX_RETRIES: ${MODEL_GATEWAY_MAX_RETRIES:-1}
      MODEL_GATEWAY_MAX_RESPONSE_BYTES: ${MODEL_GATEWAY_MAX_RESPONSE_BYTES:-1000000}
      MODEL_GATEWAY_ALLOW_INSECURE_HTTP: ${MODEL_GATEWAY_ALLOW_INSECURE_HTTP:-false}
      MODEL_GATEWAY_IDEMPOTENCY_HEADER: ${MODEL_GATEWAY_IDEMPOTENCY_HEADER:-Idempotency-Key}
      MODEL_GATEWAY_USER_AGENT: ${MODEL_GATEWAY_USER_AGENT:-durable-agent-runtime-lite/runtime-worker}
      PI_AGENT_MODE: ${PI_AGENT_MODE:-disabled}
      PI_CONTEXT_MAX_BYTES: ${PI_CONTEXT_MAX_BYTES:-262144}
      PI_SEGMENT_TIMEOUT_MS: ${PI_SEGMENT_TIMEOUT_MS:-120000}
      PI_MAX_SEGMENTS_BEFORE_CONTINUE_AS_NEW: ${PI_MAX_SEGMENTS_BEFORE_CONTINUE_AS_NEW:-20}
      LOG_LEVEL: info
    ports:
      - "${RUNTIME_WORKER_HOST_PORT:-3300}:3300"

  runtime-api:
    build:
      context: ..
      dockerfile: apps/runtime-api/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.8.0}
        BUILD_SHA: ${BUILD_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: durable-agent-runtime/runtime-api:local
    container_name: dar-runtime-api
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      temporal:
        condition: service_started
      tool-gateway:
        condition: service_started
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgres://dar:dar_local_password@postgres:5432/durable_agent_runtime
      VALKEY_URL: redis://valkey:6379
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
      RUNTIME_API_ROUTE_SOURCE: db
      RUNTIME_API_WORKFLOW_STARTER: temporal
      RUNTIME_API_AUTH_MODE: header
      MODEL_CREDENTIAL_MASTER_KEY: ${MODEL_CREDENTIAL_MASTER_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      MODEL_GATEWAY_MAX_RESPONSE_BYTES: ${MODEL_GATEWAY_MAX_RESPONSE_BYTES:-1000000}
      MODEL_GATEWAY_ALLOW_INSECURE_HTTP: ${MODEL_GATEWAY_ALLOW_INSECURE_HTTP:-false}
      ROUTER_SEMANTIC_ENABLED: ${ROUTER_SEMANTIC_ENABLED:-false}
      ROUTER_EMBEDDING_MODEL_ID: ${ROUTER_EMBEDDING_MODEL_ID:-}
      ROUTER_EMBEDDING_MODEL_VERSION: ${ROUTER_EMBEDDING_MODEL_VERSION:-}
      ROUTER_VECTOR_TOP_K: ${ROUTER_VECTOR_TOP_K:-5}
      ROUTER_SEMANTIC_MATCH_THRESHOLD: ${ROUTER_SEMANTIC_MATCH_THRESHOLD:-0.80}
      ROUTER_SEMANTIC_CLARIFY_THRESHOLD: ${ROUTER_SEMANTIC_CLARIFY_THRESHOLD:-0.65}
      ROUTER_SEMANTIC_MIN_MARGIN: ${ROUTER_SEMANTIC_MIN_MARGIN:-0.05}
      ROUTER_EMBEDDING_TIMEOUT_MS: ${ROUTER_EMBEDDING_TIMEOUT_MS:-10000}
      TENANT_RUNTIME_POLICY_MODE: required
      LOG_LEVEL: info
    ports:
      - "${RUNTIME_API_HOST_PORT:-3000}:3000"

  control-plane:
    build:
      context: ..
      dockerfile: apps/control-plane/Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-0.8.0}
        BUILD_SHA: ${BUILD_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    image: durable-agent-runtime/control-plane:local
    container_name: dar-control-plane
    depends_on:
      postgres:
        condition: service_healthy
      runtime-api:
        condition: service_started
      tool-gateway:
        condition: service_started
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3100
      DATABASE_URL: postgres://dar:dar_local_password@postgres:5432/durable_agent_runtime
      RUNTIME_API_URL: http://runtime-api:3000
      TOOL_GATEWAY_URL: http://tool-gateway:3200
      CONTROL_PLANE_TOOL_GATEWAY_TOKEN: ${CONTROL_PLANE_TOOL_GATEWAY_TOKEN:-dev-only-control-plane-token}
      CONTROL_PLANE_AUTH_MODE: header
      EVALUATION_GATE_MODE: ${EVALUATION_GATE_MODE:-required}
      MODEL_GATEWAY_CONFIG_SOURCE: ${MODEL_GATEWAY_CONFIG_SOURCE:-db}
      MODEL_CREDENTIAL_MASTER_KEY: ${MODEL_CREDENTIAL_MASTER_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      MODEL_GATEWAY_MAX_RESPONSE_BYTES: ${MODEL_GATEWAY_MAX_RESPONSE_BYTES:-1000000}
      MODEL_GATEWAY_ALLOW_INSECURE_HTTP: ${MODEL_GATEWAY_ALLOW_INSECURE_HTTP:-false}
      ROUTER_SEMANTIC_ENABLED: ${ROUTER_SEMANTIC_ENABLED:-false}
      ROUTER_EMBEDDING_MODEL_ID: ${ROUTER_EMBEDDING_MODEL_ID:-}
      ROUTER_EMBEDDING_MODEL_VERSION: ${ROUTER_EMBEDDING_MODEL_VERSION:-}
      ROUTER_VECTOR_TOP_K: ${ROUTER_VECTOR_TOP_K:-5}
      ROUTER_SEMANTIC_MATCH_THRESHOLD: ${ROUTER_SEMANTIC_MATCH_THRESHOLD:-0.80}
      ROUTER_SEMANTIC_CLARIFY_THRESHOLD: ${ROUTER_SEMANTIC_CLARIFY_THRESHOLD:-0.65}
      ROUTER_SEMANTIC_MIN_MARGIN: ${ROUTER_SEMANTIC_MIN_MARGIN:-0.05}
      ROUTER_EMBEDDING_TIMEOUT_MS: ${ROUTER_EMBEDDING_TIMEOUT_MS:-10000}
      CONTROL_PLANE_SWAGGER_ENABLED: "true"
      LOG_LEVEL: info
    ports:
      - "${CONTROL_PLANE_HOST_PORT:-3100}:3100"

volumes:
  postgres-data:
